<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador La Pezcadería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <?!= include('Estilos'); ?>
</head>

<body class="bg-slate-100 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <div id="app" class="flex flex-col h-full">

        <nav class="bg-sky-900 text-white shadow-md z-50 shrink-0">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex items-center justify-between h-16">

                    <div class="flex items-center gap-3">
                        <div class="bg-sky-700 p-2 rounded-lg">
                            <i class="bi bi-water text-xl"></i>
                        </div>
                        <span class="font-bold text-lg tracking-wide">La Pezcadería <span
                                class="font-normal text-sky-300">| Cotizador</span></span>
                    </div>

                    <div class="hidden md:flex space-x-4">
                        <button @click="cambiarVista('cotizador')"
                            :class="['px-4 py-2 rounded-md text-sm font-medium transition-colors', vistaActual === 'cotizador' ? 'bg-sky-800 text-white shadow-inner' : 'text-sky-100 hover:bg-sky-800']">
                            <i class="bi bi-cart4 mr-1"></i> Cotizar
                        </button>
                        <button @click="cambiarVista('clientes')"
                            :class="['px-4 py-2 rounded-md text-sm font-medium transition-colors', vistaActual === 'clientes' ? 'bg-sky-800 text-white shadow-inner' : 'text-sky-100 hover:bg-sky-800']">
                            <i class="bi bi-people-fill mr-1"></i> Clientes
                        </button>
                        <button @click="cambiarVista('inventario')"
                            :class="['px-4 py-2 rounded-md text-sm font-medium transition-colors', vistaActual === 'inventario' ? 'bg-sky-800 text-white shadow-inner' : 'text-sky-100 hover:bg-sky-800']">
                            <i class="bi bi-box-seam mr-1"></i> Inventario
                        </button>
                    </div>

                    <div class="flex items-center gap-3">
                        <div v-if="cargando" class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                        <span class="text-xs text-sky-200">v1.0</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow overflow-hidden relative">

            <div v-show="vistaActual === 'cotizador'" class="h-full w-full">
                <?!= include('View_Cotizador'); ?>
            </div>

            <div v-if="vistaActual === 'clientes'" class="h-full w-full overflow-y-auto p-6">
                <?!= include('View_Clientes'); ?>
            </div>

            <div v-if="vistaActual === 'inventario'" class="h-full w-full overflow-y-auto p-6">
                <?!= include('View_Inventario'); ?>
            </div>

        </main>

        <transition name="slide-fade">
            <div v-if="mensaje.texto"
                :class="['absolute bottom-5 right-5 px-6 py-4 rounded-lg shadow-2xl z-50 flex items-center gap-3 text-white max-w-sm', mensaje.tipo === 'error' ? 'bg-red-600' : 'bg-emerald-600']">
                <i
                    :class="['bi text-xl', mensaje.tipo === 'error' ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill']"></i>
                <div>
                    <p class="font-bold text-sm">{{ mensaje.tipo === 'error' ? 'Error' : 'Éxito' }}</p>
                    <p class="text-sm opacity-90">{{ mensaje.texto }}</p>
                </div>
            </div>
        </transition>

    </div>

    <?!= include('JS_Main'); ?>
</body>

</html>
