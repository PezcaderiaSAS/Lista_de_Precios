<div class="flex flex-col h-screen items-center justify-center bg-slate-100 p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm animate-[fadeIn_0.5s]">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4 shadow-inner">
                <i class="bi bi-shield-lock-fill text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Iniciar Sesión</h2>
            <p class="text-slate-500 text-sm mt-1">Cotizador La Pezcadería</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">PIN de Acceso</label>
                <div class="relative">
                    <input type="password" v-model="pinForm" @keyup.enter="iniciarSesion" placeholder="••••••"
                        class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-mono tracking-widest text-lg text-center"
                        :disabled="cargandoLogin" autocomplete="off" id="pinInput">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="bi bi-key text-slate-400"></i>
                    </div>
                </div>
            </div>

            <button @click="iniciarSesion" :disabled="!pinForm || cargandoLogin"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-95">
                <span v-if="!cargandoLogin"><i class="bi bi-box-arrow-in-right mr-2"></i>Entrar</span>
                <span v-else class="flex items-center gap-2">
                    <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    Verificando...
                </span>
            </button>

            <div v-if="errorLogin"
                class="mt-4 p-3 bg-red-50 text-red-700 text-sm font-medium rounded-lg border border-red-200 text-center animate-[fadeIn_0.3s]">
                <i class="bi bi-exclamation-triangle-fill mr-1"></i> {{ errorLogin }}
            </div>
        </div>
    </div>

    <div class="mt-8 text-slate-400 text-xs text-center">
        Protegido por Google Cloud. Las acciones serán registradas.
    </div>
</div>
